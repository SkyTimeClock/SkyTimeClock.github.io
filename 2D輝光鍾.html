<!doctypehtml><html lang="zh-Hant"><meta charset="utf-8"><meta content="width=device-width,initial-scale=1"name="viewport"><title>2D 輝光鐘 (Nixie Clock)</title><style>@import url(https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;650;750&family=JetBrains+Mono:wght@400;500;700&display=swap);:root{color-scheme:dark;--panel:rgba(16, 18, 22, 0.9);--line:rgba(255, 255, 255, 0.1);--ink:#f6f0e6;--muted:#a49e94;--accent:#ff7a2e;--focus:#38bdf8;--shadow:rgba(0, 0, 0, 0.6)}*{box-sizing:border-box;margin:0;padding:0}body,html{width:100%;min-height:100vh;background:radial-gradient(circle at 50% -12%,rgba(255,110,40,.08),transparent 50rem),linear-gradient(180deg,#181a1f 0,#07080a 65%,#030405 100%);color:var(--ink);font-family:Outfit,"Segoe UI","Noto Sans TC",system-ui,sans-serif;overflow-x:hidden}body{display:grid;place-items:center;padding:clamp(16px,4vw,40px)}.app{width:min(1360px,100%);display:grid;gap:20px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:48px}.brand{display:flex;align-items:center;gap:12px;color:#fff8f0;font-weight:750;font-size:clamp(20px,2.5vw,28px);letter-spacing:-.02em}.brand-mark{width:14px;height:32px;border-radius:10px;background:linear-gradient(180deg,#fffcf5,#ff8a28 45%,#e12711);box-shadow:0 0 16px #ff6d26,0 0 32px rgba(255,93,34,.7);flex:0 0 auto}.icon-button,.text-button{border:1px solid var(--line);color:var(--ink);background:rgba(20,22,28,.6);backdrop-filter:blur(12px);box-shadow:0 8px 32px var(--shadow),inset 0 1px 0 rgba(255,255,255,.05);cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1)}.icon-button{width:44px;height:44px;display:grid;place-items:center;border-radius:12px}.text-button{min-height:42px;padding:0 20px;border-radius:12px;font-weight:650}.icon-button:hover,.text-button:hover{transform:translateY(-2px);border-color:rgba(255,122,46,.5);background:rgba(30,24,20,.85);box-shadow:0 12px 40px rgba(255,122,46,.12),0 4px 12px var(--shadow)}.icon-button:active,.text-button:active{transform:translateY(0)}.icon-button:focus-visible,.text-button:focus-visible,input:focus-visible{outline:2px solid var(--focus);outline-offset:2px}.stage{position:relative;width:100%;min-height:clamp(460px,55vw,680px);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:radial-gradient(circle at 50% 12%,rgba(255,110,40,.05),transparent 45%),#040507;box-shadow:0 40px 90px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.03);isolation:isolate}.stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block}#threeLayer{z-index:0}#clockCanvas{z-index:1}.stage-vignette{position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(90deg,rgba(0,0,0,.45),transparent 15%,transparent 85%,rgba(0,0,0,.45)),radial-gradient(circle at 50% 50%,transparent 40%,rgba(0,0,0,.4) 100%);mix-blend-mode:multiply}dialog{width:min(1040px,calc(100vw - 32px));max-height:min(860px,calc(100vh - 40px));border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:0;color:var(--ink);background:rgba(12,14,18,.96);box-shadow:0 40px 100px rgba(0,0,0,.85);overflow:hidden;margin:auto}dialog::backdrop{background:rgba(0,0,0,.75);backdrop-filter:blur(8px)}.settings-head{min-height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 24px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}.settings-title{font-weight:750;font-size:20px;letter-spacing:-.01em;color:#fff8f0}.settings-body{padding:24px;display:grid;grid-template-columns:minmax(0,1.15fr) minmax(300px,.85fr);gap:20px;overflow:auto;max-height:calc(100vh - 130px)}.panel{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.025);padding:20px}.panel h2{margin-bottom:16px;font-size:16px;font-weight:650;color:#fff3e3;border-left:3px solid var(--accent);padding-left:10px}.color-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.color-cell{min-width:0;display:flex;flex-direction:column;gap:8px;padding:12px;border-radius:12px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05);align-items:center;text-align:center}.color-cell span{width:100%;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}input[type=color]{width:44px;height:44px;padding:0;border:0;border-radius:10px;background:0 0;cursor:pointer}.range-list{display:grid;gap:16px}.range-row{display:grid;grid-template-columns:100px 1fr 50px;align-items:center;gap:12px;color:var(--muted);font-size:14px}input[type=range]{width:100%;accent-color:var(--accent);height:6px;border-radius:3px;background:rgba(255,255,255,.1);outline:0}.range-value{text-align:right;color:#fff;font-family:"JetBrains Mono",monospace;font-size:13px}.settings-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:12px}@media (max-width:860px){body{padding:16px}.stage{min-height:480px}.settings-body{grid-template-columns:1fr}.color-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.range-row{grid-template-columns:1fr;gap:6px}.range-value{text-align:left}}@media (max-width:520px){.color-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}</style><main class="app"><header class="topbar"><div class="brand"aria-label="Glow Tube Clock"><span aria-hidden="true"class="brand-mark"></span> <span>Glow Tube Clock</span></div><button class="icon-button"type="button"aria-label="參數設定"title="參數設定"id="openSettings"><svg aria-hidden="true"height="22"viewBox="0 0 24 24"width="22"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"fill="none"stroke="currentColor"stroke-linecap="round"stroke-width="2.0"stroke-linejoin="round"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2.05 2.05 0 1 1-2.9 2.9l-.06-.06A1.7 1.7 0 0 0 15 19.43a1.7 1.7 0 0 0-1 .25 1.7 1.7 0 0 0-.82 1.46V21a2.05 2.05 0 1 1-4.1 0v-.09a1.7 1.7 0 0 0-.82-1.46 1.7 1.7 0 0 0-1-.25 1.7 1.7 0 0 0-1.87.34l-.06.06a2.05 2.05 0 1 1-2.9-2.9l.06-.06A1.7 1.7 0 0 0 2.57 15a1.7 1.7 0 0 0-.25-1A1.7 1.7 0 0 0 .86 13.2H.8a2.05 2.05 0 1 1 0
